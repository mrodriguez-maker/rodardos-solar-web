<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RODARDOS Solar — Mantenimiento O&amp;M de parques solares</title>
<meta name="description" content="Limpieza de paneles, control de vegetación e inspección termográfica para parques solares a gran escala. Base Guaymas, Sonora. Equipo propio, SLA por contrato."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  html { scroll-behavior: smooth; }
  body { background: #0A1454; }

  .page-root {
    width: 100%;
    min-height: 100vh;
    background: #0A1454;
    color: #fff;
    font-feature-settings: "ss01", "cv11";
  }

  .header-standalone {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(143,196,243,0.15);
    transition: background 0.2s ease;
  }

  section[id] { scroll-margin-top: 80px; }

  /* ===== RESPONSIVE GRIDS ===== */
  .hero-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 64px;
    align-items: center;
  }
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-top: 80px;
  }
  .services-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .tastiota-main-grid {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
  }
  .tastiota-data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .diff-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .form-layout {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 80px;
  }
  .form-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  /* ===== HAMBURGER ===== */
  .nav-desktop { display: flex; gap: 32px; align-items: center; }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
  .hamburger span { display: block; width: 24px; height: 2px; background: #fff; transition: transform 0.2s, opacity 0.2s; }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-menu {
    display: none;
    flex-direction: column;
    padding: 16px 20px 24px;
    border-top: 1px solid rgba(143,196,243,0.15);
    gap: 4px;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.06em;
    padding: 12px 0;
    border-bottom: 1px solid rgba(143,196,243,0.1);
    opacity: 0.85;
  }
  .mobile-menu a.cta {
    margin-top: 12px;
    padding: 14px 20px;
    background: var(--cielo);
    color: var(--marino-deep);
    font-weight: 700;
    text-align: center;
    border-bottom: none;
    opacity: 1;
  }

  /* ===== TABLET (≤1024px) ===== */
  @media (max-width: 1024px) {
    .hero-grid { grid-template-columns: 1fr; gap: 48px; }
    .photo-stack { display: none; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .tastiota-main-grid { grid-template-columns: 1fr; }
    .tastiota-data-grid { border-top: 1px solid rgba(143,196,243,0.2); }
    .form-layout { grid-template-columns: 1fr; gap: 48px; }
  }

  /* ===== MOBILE (≤768px) ===== */
  @media (max-width: 768px) {
    .container { padding: 0 20px !important; }

    .nav-desktop { display: none; }
    .hamburger { display: flex; }

    .hero-grid { gap: 32px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); margin-top: 48px; }

    .services-grid { grid-template-columns: 1fr; }

    .tastiota-section-header { flex-direction: column !important; align-items: flex-start !important; gap: 20px; }
    .tastiota-main-grid { grid-template-columns: 1fr; }
    .tastiota-left-panel { border-right: none !important; border-bottom: 1px solid rgba(143,196,243,0.2) !important; padding: 24px !important; }
    .tastiota-data-grid { grid-template-columns: 1fr 1fr; }

    .diff-grid { grid-template-columns: 1fr; }

    .form-layout { grid-template-columns: 1fr !important; gap: 40px; }
    .form-fields { grid-template-columns: 1fr !important; padding: 24px !important; }
    .form-fields .field { grid-column: auto !important; }
    .form-fields button[type="submit"] { grid-column: auto !important; }

    .footer-inner { flex-direction: column !important; align-items: flex-start !important; gap: 16px; }
    .footer-meta { flex-direction: column !important; gap: 8px !important; }

    .header-inner { padding: 14px 20px !important; }
    .division-badge { display: none; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="variant-color.jsx"></script>

<script type="text/babel">
const PHOTOS_REAL = {
  rowClean:      'assets/desh-01-row-clean.jpg',
  tallGrass:     'assets/desh-02-tall-grass.jpg',
  overgrowth:    'assets/desh-03-overgrowth.jpg',
  workerTrimmer: 'assets/desh-04-worker-trimmer.jpg',
  workerRow:     'assets/desh-05-worker-row.jpg',
  tracker:       'assets/desh-06-tracker.jpg',
  panelAngle:    'assets/desh-07-panel-angle.jpg',
};
window.PHOTOS_REAL = PHOTOS_REAL;

const NAV_LINKS = [
  { label: 'Servicios',     href: '#servicios'       },
  { label: 'Capacidades',   href: '#diferenciadores'  },
  { label: 'Caso Tastiota', href: '#tastiota'         },
  { label: 'Cotización',    href: '#cotizacion'       },
];

const Header = () => {
  const [scrolled, setScrolled] = React.useState(false);
  const [menuOpen, setMenuOpen] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const closeMenu = () => setMenuOpen(false);

  return (
    <header className="header-standalone" style={{
      background: scrolled ? 'rgba(10,20,84,0.97)' : 'rgba(10,20,84,0.80)',
    }}>
      <div className="header-inner" style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'18px 64px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <a href="#top"><RodardosWordmark color="#fff" arc="var(--cielo)"/></a>
          <span className="division-badge" style={{
            fontSize:11, fontFamily:'var(--font-mono)', color:'var(--cielo)',
            padding:'4px 10px', border:'1px solid rgba(143,196,243,0.4)', borderRadius:2,
            letterSpacing:'0.1em', background:'rgba(143,196,243,0.08)',
          }}>SOLAR · DIVISIÓN_</span>
        </div>

        {/* Desktop nav */}
        <nav className="nav-desktop">
          {NAV_LINKS.map(l => (
            <a key={l.href} href={l.href} style={{
              color:'#fff', fontSize:13, fontFamily:'var(--font-mono)',
              opacity:0.85, letterSpacing:'0.04em', transition:'opacity 0.15s',
            }}
            onMouseEnter={e => e.target.style.opacity = 1}
            onMouseLeave={e => e.target.style.opacity = 0.85}
            >{l.label}</a>
          ))}
          <a href="#cotizacion" className="btn" style={{
            background:'var(--cielo)', color:'var(--marino-deep)', padding:'11px 20px',
            fontSize:13, fontFamily:'var(--font-mono)', letterSpacing:'0.06em',
            borderRadius:2, fontWeight:700,
          }}>SOLICITAR PROPUESTA →</a>
        </nav>

        {/* Hamburger */}
        <button
          className={`hamburger ${menuOpen ? 'open' : ''}`}
          onClick={() => setMenuOpen(o => !o)}
          aria-label="Menú"
        >
          <span/><span/><span/>
        </button>
      </div>

      {/* Mobile menu */}
      <div className={`mobile-menu ${menuOpen ? 'open' : ''}`}>
        {NAV_LINKS.map(l => (
          <a key={l.href} href={l.href} onClick={closeMenu}>{l.label}</a>
        ))}
        <a href="#cotizacion" className="cta" onClick={closeMenu}>SOLICITAR PROPUESTA →</a>
      </div>
    </header>
  );
};

const VariantColorStandalone = () => {
  const P = window.PHOTOS_REAL;

  return (
    <div style={{ width:'100%' }}>

      {/* ── HERO ── */}
      <section id="hero" style={{
        position:'relative', minHeight:'100vh', color:'#fff',
        background:'#0A1454', overflow:'hidden',
        paddingTop:180, paddingBottom:120,
      }}>
        <div style={{ position:'absolute', top:'-200px', right:'-100px', width:800, height:800, background:'radial-gradient(circle, rgba(143,196,243,0.55) 0%, transparent 60%)', pointerEvents:'none' }}/>
        <div style={{ position:'absolute', bottom:'-300px', left:'-200px', width:900, height:900, background:'radial-gradient(circle, rgba(74,135,255,0.4) 0%, transparent 65%)', pointerEvents:'none' }}/>
        <div style={{ position:'absolute', top:'20%', left:'40%', width:500, height:500, background:'radial-gradient(circle, rgba(20,180,255,0.25) 0%, transparent 70%)', pointerEvents:'none' }}/>
        <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity:0.12 }} aria-hidden>
          <defs>
            <pattern id="gridF" width="56" height="56" patternUnits="userSpaceOnUse">
              <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#8FC4F3" strokeWidth="1"/>
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#gridF)"/>
        </svg>

        <div className="container" style={{ position:'relative' }}>
          <div className="hero-grid">
            {/* Left — copy */}
            <div>
              <div style={{
                display:'inline-flex', alignItems:'center', gap:10, marginBottom:32,
                fontFamily:'var(--font-mono)', fontSize:12, letterSpacing:'0.12em',
                padding:'8px 14px',
                background:'linear-gradient(90deg, rgba(143,196,243,0.18), rgba(143,196,243,0.04))',
                border:'1px solid rgba(143,196,243,0.3)', borderRadius:999,
              }}>
                <span style={{ width:8, height:8, background:'#3FE07A', borderRadius:'50%', boxShadow:'0 0 12px #3FE07A' }}/>
                <span style={{ color:'var(--cielo)' }}>EN_OPERACIÓN_</span>
                <span style={{ opacity:0.7 }}>· TASTIOTA · 27.9°N · 110.9°W</span>
              </div>
              <h1 style={{ fontSize:'clamp(48px,6.5vw,96px)', lineHeight:0.9, fontWeight:700, letterSpacing:'-0.035em', marginBottom:32, textWrap:'balance' }}>
                Mantenemos<br/>
                en línea cada<br/>
                <span style={{ backgroundImage:'linear-gradient(90deg, #8FC4F3 0%, #4A87FF 100%)', WebkitBackgroundClip:'text', backgroundClip:'text', color:'transparent', fontStyle:'italic' }}>watt</span> de tu parque.
              </h1>
              <p style={{ fontSize:'clamp(16px,1.4vw,19px)', lineHeight:1.55, maxWidth:580, opacity:0.88, marginBottom:40 }}>
                Deshierbe especializado y limpieza de paneles para parques solares a gran escala.
                Operación medible — performance ratio, soiling, tiempos de respuesta —
                reportada al asset manager cada semana.
              </p>
              <div style={{ display:'flex', gap:12, flexWrap:'wrap' }}>
                <a href="#cotizacion" className="btn" style={{
                  background:'var(--cielo)', color:'var(--marino-deep)', padding:'18px 28px',
                  fontFamily:'var(--font-mono)', fontSize:14, letterSpacing:'0.08em',
                  borderRadius:2, fontWeight:700,
                  boxShadow:'0 12px 32px -8px rgba(143,196,243,0.5)',
                }}>SOLICITAR PROPUESTA →</a>
                <a href="#tastiota" className="btn" style={{
                  color:'#fff', border:'1px solid rgba(143,196,243,0.4)', padding:'18px 28px',
                  fontFamily:'var(--font-mono)', fontSize:14, letterSpacing:'0.08em', borderRadius:2,
                  background:'rgba(143,196,243,0.05)',
                }}>VER TASTIOTA →</a>
              </div>
            </div>

            {/* Right — fotos (oculto en mobile via .photo-stack) */}
            <div className="photo-stack" style={{ position:'relative', height:580 }}>
              <div style={{ position:'absolute', top:0, right:0, width:'78%', aspectRatio:'4/5', borderRadius:4, overflow:'hidden', boxShadow:'0 32px 80px -16px rgba(0,0,0,0.5)', border:'2px solid var(--cielo)' }}>

                <div style={{ position:'absolute', top:12, left:12, fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'0.14em', textShadow:'0 1px 2px rgba(0,0,0,0.6)' }}>IMG_001 · TRACKER_EJE_SIMPLE</div>
              </div>
              <div style={{ position:'absolute', bottom:24, left:0, width:'52%', aspectRatio:'4/3', borderRadius:4, overflow:'hidden', boxShadow:'0 24px 48px -16px rgba(0,0,0,0.6)', border:'2px solid #4A87FF' }}>
                <img src={P.workerTrimmer} alt="Deshierbe operativo Tastiota" style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
                <div style={{ position:'absolute', top:8, left:8, fontFamily:'var(--font-mono)', fontSize:9, letterSpacing:'0.14em', textShadow:'0 1px 2px rgba(0,0,0,0.6)' }}>IMG_002 · DESHIERBE_OPERATIVO</div>
              </div>
              <div style={{ position:'absolute', top:'38%', right:'-8%', background:'linear-gradient(135deg, #4A87FF 0%, #1F4FCC 100%)', color:'#fff', padding:'20px 26px', borderRadius:4, boxShadow:'0 24px 48px -8px rgba(74,135,255,0.5)', minWidth:220 }}>
                <div style={{ fontSize:10, fontFamily:'var(--font-mono)', letterSpacing:'0.14em', opacity:0.9, marginBottom:8 }}>MÓDULOS_BAJO_LIMPIEZA</div>
                <div className="tabular" style={{ fontSize:36, fontWeight:800, letterSpacing:'-0.02em', lineHeight:1 }}>288,580</div>
                <div style={{ fontSize:11, fontFamily:'var(--font-mono)', opacity:0.85, marginTop:8 }}>Canadian Solar BiHiKu7</div>
              </div>
            </div>
          </div>

          {/* KPIs */}
          <div className="kpi-grid">
            {[
              { label:'PANELES',      value:'288,580', unit:'u',    delta:'+100% propios', tone:'rgba(143,196,243,0.18)', accent:'var(--cielo)' },
              { label:'SUPERFICIE',   value:'646,750', unit:'m²',   delta:'215 ha útiles',  tone:'rgba(74,135,255,0.2)',  accent:'#7AA8FF'       },
              { label:'SLA',          value:'100',     unit:'%',    delta:'Por contrato',   tone:'rgba(31,155,90,0.2)',   accent:'#3FE07A'       },

                  {k.value}<span style={{ fontSize:14, opacity:0.65, fontWeight:400 }}>{k.unit}</span>
                </div>

              </div>

          </div>
        </div>
      </section>

      {/* ── SERVICIOS ── */}

        <div style={{ position:'absolute', top:'20%', right:'-200px', width:600, height:600, background:'radial-gradient(circle, rgba(143,196,243,0.18) 0%, transparent 65%)', pointerEvents:'none' }}/>
        <div className="container" style={{ position:'relative' }}>

              <div style={{ fontSize:12, fontFamily:'var(--font-mono)', color:'var(--cielo)', letterSpacing:'0.12em', marginBottom:16 }}>// SERVICIOS.json</div>

                    <div style={{ position:'absolute', top:12, left:12, fontFamily:'var(--font-mono)', fontSize:11, letterSpacing:'0.14em', background:accent, color:'var(--marino-deep)', padding:'4px 10px', fontWeight:700 }}>SVC_0{i+1}</div>

                  <div style={{ padding:28, display:'flex', flexDirection:'column', gap:16, flex:1 }}>

                  </div>
                </article>
              );

          </div>
        </div>
      </section>

      {/* ── TASTIOTA ── */}
      <section id="tastiota" style={{ padding:'var(--d-section) 0', position:'relative', overflow:'hidden', background:'#0A1454', color:'#fff' }}>

        <div style={{ position:'absolute', top:0, right:0, width:'60%', height:'100%', background:'linear-gradient(90deg, #0A1454 30%, transparent 100%)', pointerEvents:'none' }}/>

        <div className="container" style={{ position:'relative' }}>
          <div className="tastiota-section-header" style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', marginBottom:56 }}>
            <div>
              <div style={{ fontSize:12, fontFamily:'var(--font-mono)', color:'var(--cielo)', letterSpacing:'0.12em', marginBottom:12 }}>// CASO_ESTUDIO.live</div>
              <h2 style={{ fontSize:'clamp(48px,7.5vw,104px)', lineHeight:0.88, fontWeight:800, letterSpacing:'-0.04em' }}>
                TASTIOTA<span style={{ backgroundImage:'linear-gradient(90deg, #8FC4F3, #4A87FF)', WebkitBackgroundClip:'text', backgroundClip:'text', color:'transparent' }}>.</span>
              </h2>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--cielo)', letterSpacing:'0.12em', marginBottom:6 }}>ESTADO</div>
              <div style={{ display:'flex', alignItems:'center', gap:8, justifyContent:'flex-end', padding:'8px 16px', background:'rgba(63,224,122,0.15)', border:'1px solid rgba(63,224,122,0.4)', borderRadius:999 }}>
                <span style={{ width:8, height:8, background:'#3FE07A', borderRadius:'50%', boxShadow:'0 0 10px #3FE07A', flexShrink:0 }}/>
                <span style={{ fontFamily:'var(--font-mono)', fontSize:13, letterSpacing:'0.08em' }}>EN_EJECUCIÓN</span>
              </div>
            </div>
          </div>

          <div style={{ background:'linear-gradient(135deg, rgba(143,196,243,0.06), rgba(74,135,255,0.04))', border:'1px solid rgba(143,196,243,0.25)', backdropFilter:'blur(12px)' }}>
            <div className="tastiota-main-grid">
              <div className="tastiota-left-panel" style={{ padding:40, borderRight:'1px solid rgba(143,196,243,0.2)' }}>
                <h3 style={{ fontSize:32, fontWeight:700, marginBottom:8, letterSpacing:'-0.015em' }}>Parque Solar Caracolí</h3>
                <p style={{ fontSize:13, fontFamily:'var(--font-mono)', color:'var(--cielo)', letterSpacing:'0.08em', marginBottom:24 }}>CLIENTE: REVERAU · REVERGY GROUP</p>
                <p style={{ fontSize:16, lineHeight:1.65, opacity:0.88, marginBottom:28 }}>
                  Limpieza one-time de 288,580 paneles bifaciales sobre 215 ha útiles, con cumplimiento
                  de las especificaciones técnicas de Canadian Solar para preservar garantía.
                </p>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                  <div style={{ position:'relative', aspectRatio:'4/3', overflow:'hidden' }}>
                    <img src={P.tallGrass} alt="Estado inicial — vegetación alta" style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
                    <div style={{ position:'absolute', top:8, left:8, padding:'3px 8px', background:'#FFD466', color:'var(--marino-deep)', fontFamily:'var(--font-mono)', fontSize:9, fontWeight:700, letterSpacing:'0.12em' }}>ANTES</div>
                  </div>
                  <div style={{ position:'relative', aspectRatio:'4/3', overflow:'hidden' }}>
                    <img src={P.rowClean} alt="Resultado — filas limpias" style={{ width:'100%', height:'100%', objectFit:'cover' }}/>
                    <div style={{ position:'absolute', top:8, left:8, padding:'3px 8px', background:'#3FE07A', color:'var(--marino-deep)', fontFamily:'var(--font-mono)', fontSize:9, fontWeight:700, letterSpacing:'0.12em' }}>DESPUÉS</div>
                  </div>
                </div>
              </div>
              <div className="tastiota-data-grid">
                {[
                  ['MÓDULOS',      '288,580',   'unidades',        'var(--cielo)'],
                  ['MODELO',       'BiHiKu7',   'CS7N-MB-AG',      '#7AA8FF'     ],
                  ['POTENCIA',     '640–665',   'W bifaciales',    '#A5C9FF'     ],
                  ['SUPERFICIE',   '646,750',   'm² · 215 ha',     'var(--cielo)'],
                  ['ESTRUCTURA',   'Tracker',   'single-axis',     '#7AA8FF'     ],
                  ['PLAZO',        '6',         'semanas',         '#3FE07A'     ],
                  ['CONTRATISTA',  'RODARDOS',  'Guaymas, Sonora', 'var(--cielo)'],
                  ['ALCANCE',      '3 SVC',     'limp+veg+caminos','#FFD466'     ],
                ].map(([k, v, sub, accent], i) => (
                  <div key={i} style={{ padding:'24px 28px', borderBottom: i < 6 ? '1px solid rgba(143,196,243,0.15)' : 'none', borderRight: i % 2 === 0 ? '1px solid rgba(143,196,243,0.15)' : 'none' }}>
                    <div style={{ fontSize:10, fontFamily:'var(--font-mono)', color:accent, letterSpacing:'0.14em', marginBottom:8 }}>{k}</div>
                    <div className="tabular" style={{ fontSize:'clamp(20px,2.2vw,30px)', fontWeight:700, letterSpacing:'-0.02em', lineHeight:1 }}>{v}</div>
                    <div style={{ fontSize:11, fontFamily:'var(--font-mono)', opacity:0.55, marginTop:6, letterSpacing:'0.04em' }}>{sub}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ── DIFERENCIADORES ── */}
      <section id="diferenciadores" style={{ padding:'var(--d-section) 0', background:'linear-gradient(180deg, #0A1454, #1F4FCC 200%)', color:'#fff', position:'relative', overflow:'hidden' }}>
        <div className="container" style={{ position:'relative' }}>
          <div style={{ fontSize:12, fontFamily:'var(--font-mono)', color:'var(--cielo)', letterSpacing:'0.12em', marginBottom:16 }}>// DIFERENCIADORES.js</div>
          <h2 style={{ fontSize:'clamp(28px,4.5vw,64px)', lineHeight:1, fontWeight:800, letterSpacing:'-0.025em', marginBottom:56 }}>
            Tres compromisos que firmamos,<br/>
            <span style={{ backgroundImage:'linear-gradient(90deg, #8FC4F3, #4A87FF, #8FC4F3)', WebkitBackgroundClip:'text', backgroundClip:'text', color:'transparent' }}>ejecutamos y reportamos.</span>
          </h2>
          <div className="diff-grid">
            {DIFERENCIADORES.map((d, i) => {
              const I = d.icon;
              const grad = i === 0 ? 'linear-gradient(135deg, rgba(143,196,243,0.22), rgba(143,196,243,0.04))'
                         : i === 1 ? 'linear-gradient(135deg, rgba(74,135,255,0.25), rgba(74,135,255,0.04))'
                         : 'linear-gradient(135deg, rgba(31,155,90,0.22), rgba(31,155,90,0.04))';
              const accent = i === 0 ? 'var(--cielo)' : i === 1 ? '#7AA8FF' : '#3FE07A';
              return (
                <div key={i} style={{ padding:36, background:grad, border:`1px solid ${accent}40`, borderTop:`3px solid ${accent}`, minHeight:240, display:'flex', flexDirection:'column' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:24 }}>
                    <div style={{ color:accent }}><I/></div>
                    <div className="tabular" style={{ fontFamily:'var(--font-mono)', fontSize:13, color:accent, letterSpacing:'0.08em' }}>DIFER_0{i+1}</div>
                  </div>
                  <h3 style={{ fontSize:26, fontWeight:700, marginBottom:12, letterSpacing:'-0.01em' }}>{d.title}</h3>
                  <p style={{ fontSize:15, lineHeight:1.6, opacity:0.82 }}>{d.body}</p>
                </div>
              );
            })}
          </div>
        </div>
      </section>

      {/* ── COTIZACIÓN ── */}
      <section id="cotizacion" style={{ padding:'var(--d-section) 0', background:'linear-gradient(180deg, #0A1454 0%, #050A2E 100%)', color:'#fff', position:'relative', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:'10%', right:'-15%', width:700, height:700, background:'radial-gradient(circle, rgba(143,196,243,0.2) 0%, transparent 65%)', pointerEvents:'none' }}/>
        <div className="container" style={{ position:'relative' }}>
          <div className="form-layout">
            <div>
              <div style={{ fontSize:12, fontFamily:'var(--font-mono)', color:'var(--cielo)', letterSpacing:'0.12em', marginBottom:16 }}>// SOLICITAR_COTIZACIÓN.form</div>
              <h2 style={{ fontSize:'clamp(36px,4vw,60px)', lineHeight:0.95, fontWeight:800, letterSpacing:'-0.03em', marginBottom:24 }}>
                Cotiza<br/>
                <span style={{ backgroundImage:'linear-gradient(90deg, #8FC4F3, #4A87FF)', WebkitBackgroundClip:'text', backgroundClip:'text', color:'transparent' }}>tu parque.</span>
              </h2>
              <p style={{ fontSize:17, lineHeight:1.6, opacity:0.85, marginBottom:32 }}>
                Respondemos en menos de 48 horas con propuesta técnico-económica:
                alcance, plazo, equipo asignado, SLA y reporte semanal.
              </p>
              <div style={{ padding:24, background:'linear-gradient(135deg, rgba(143,196,243,0.12), rgba(143,196,243,0.02))', border:'1px solid rgba(143,196,243,0.3)', borderTop:'3px solid var(--cielo)' }}>
                <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--cielo)', letterSpacing:'0.1em', marginBottom:12 }}>CONTACTO.directo</div>
                <div style={{ fontSize:18, fontWeight:600 }}>mrodriguez@rodardos.com</div>
                <div style={{ fontSize:14, opacity:0.8, marginTop:4 }}>+52 622 169 0609 · Guaymas, Sonora</div>
              </div>
            </div>
            <form
              className="form-fields"
              style={{ background:'linear-gradient(135deg, rgba(143,196,243,0.08), rgba(74,135,255,0.04))', border:'1px solid rgba(143,196,243,0.25)', padding:40, backdropFilter:'blur(8px)', alignContent:'start' }}
              onSubmit={(e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const d = Object.fromEntries(fd.entries());

                // 1. WhatsApp
                const msg = [
                  'Buen día, me comunico a través del sitio web de RODARDOS Solar para solicitar una cotización.',
                  '',
                  '*Datos del proyecto:*',
                  `Proyecto: ${d.proyecto || '—'}`,
                  `Empresa: ${d.empresa || '—'}`,
                  `Rol: ${d.rol || '—'}`,
                  `Capacidad: ${d.mw || '—'} MW`,
                  `Módulos: ${d.mod || '—'}`,
                  `Estado: ${d.estado || '—'}`,
                  `Fecha objetivo: ${d.fecha || '—'}`,
                  `Correo de contacto: ${d.email || '—'}`,
                  '',
                  'Quedo en espera de su propuesta. Gracias.',
                ].join('\n');
                window.open('https://wa.me/526221690609?text=' + encodeURIComponent(msg), '_blank');

                // 2. Google Sheet
                const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxoSQMsRB7mfOk6lHUoQAxo7BYvaZqOqv3S-1JVsM9SdpwMOt7Rd-jAXMypdAx7c-g9ZQ/exec';
                fetch(APPS_SCRIPT_URL, {
                  method: 'POST',
                  mode: 'no-cors',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  body: new URLSearchParams(d).toString(),
                }).catch(() => {});

                e.target.reset();
              }}
            >
              {[
                ['proyecto', 'NOMBRE DEL PROYECTO', 'Ej. Parque Solar Caracolí',  'span 2'],
                ['empresa',  'EMPRESA',            'Nombre de tu empresa',       null    ],
                ['rol',      'ROL',                'Ej. Gerente de operaciones', null    ],
                ['mw',       'CAPACIDAD (MW)',      'Ej. 180',                    null    ],
                ['mod',      'NO. DE MÓDULOS',      'Ej. 288,580',               null    ],
                ['estado',   'ESTADO',              'Ej. Sonora',                null    ],
                ['fecha',    'FECHA OBJETIVO',      '',                           null    ],
                ['email',    'CORREO ELECTRÓNICO',  'contacto@tuempresa.com',     'span 2'],
              ].map(([id, label, ph, span]) => (
                <div key={id} className="field" style={{ gridColumn: span || 'auto' }}>
                  <label style={{ fontFamily:'var(--font-mono)', color:'var(--cielo)', fontSize:11 }}>{label}</label>
                  <input
                    id={id} name={id} placeholder={ph}
                    type={id === 'fecha' ? 'date' : id === 'email' ? 'email' : 'text'}
                    style={{ background:'rgba(10,20,84,0.5)', border:'1px solid rgba(143,196,243,0.3)', color:'#fff', borderRadius:0, padding:'14px 16px' }}
                  />
                </div>
              ))}
              <button type="submit" style={{ gridColumn:'span 2', padding:20, background:'linear-gradient(90deg, #8FC4F3 0%, #4A87FF 100%)', color:'var(--marino-deep)', fontFamily:'var(--font-mono)', fontWeight:800, letterSpacing:'0.08em', fontSize:14, border:'none', cursor:'pointer', borderRadius:0, boxShadow:'0 12px 32px -8px rgba(143,196,243,0.4)' }}>
                ENVIAR SOLICITUD →
              </button>
            </form>
          </div>
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer style={{ background:'#050A2E', color:'#fff', padding:'48px 0', borderTop:'1px solid rgba(143,196,243,0.25)' }}>
        <div className="container footer-inner" style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:24 }}>
          <RodardosWordmark color="#fff" arc="var(--cielo)"/>
          <div className="footer-meta" style={{ display:'flex', gap:40, fontFamily:'var(--font-mono)', fontSize:12, letterSpacing:'0.08em', opacity:0.7, flexWrap:'wrap' }}>
            <span>© 2026 RODARDOS S.A. DE C.V.</span>
            <span style={{ color:'var(--cielo)' }}>DIVISIÓN_SOLAR</span>
            <span>GUAYMAS · MX</span>
          </div>
        </div>
      </footer>
    </div>
  );
};

const App = () => (
  <div id="top" className="page-root">
    <Header/>
    <VariantColorStandalone/>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
