<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RODARDOS Solar — Mantenimiento O&M de parques solares</title>
<meta name="description" content="Limpieza de paneles y control de vegetación para parques solares a gran escala. Base Guaymas, Sonora. Equipo propio, SLA por contrato."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
/* ============ TOKENS ============ */
:root {
  --marino: #14247E;
  --marino-deep: #0C1654;
  --marino-soft: #2A3E9E;
  --cielo: #8FC4F3;
  --cielo-soft: #C9E1F8;
  --acero: #92A1A1;
  --asfalto: #1F252E;
  --gris: #B8BFC2;
  --gris-soft: #E8EBED;
  --bg: #FFFFFF;
  --paper: #F6F7F9;
  --ink: #0E1530;
  --ink-soft: #4A536B;
  --solar: #F5B800;
  --verde: #1F9B5A;
  --accent: var(--marino);
  --accent-ink: #FFFFFF;
  --d-section: 120px;
  --d-block: 64px;
  --d-tight: 24px;
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --font-display: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: var(--font-sans); color: var(--ink); -webkit-font-smoothing: antialiased; }
html { scroll-behavior: smooth; }
img { display: block; max-width: 100%; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }
input, textarea, select { font: inherit; }

body { background: #0A1454; }

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 64px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 28px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 15px;
  transition: transform .15s ease, background .15s ease;
  cursor: pointer;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }

.logo-mark { display: inline-flex; align-items: center; gap: 10px; }
.logo-mark svg { display: block; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}
.field input, .field select, .field textarea {
  padding: 14px 16px;
  border: 1px solid rgba(143,196,243,0.3);
  background: rgba(10,20,84,0.5);
  color: #fff;
  border-radius: 0;
  outline: none;
  transition: border-color .15s ease;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--cielo);
}
.field input::placeholder { color: rgba(255,255,255,0.35); }

.tabular { font-variant-numeric: tabular-nums; }

.page-root {
  width: 100%;
  min-height: 100vh;
  background: #0A1454;
  color: #fff;
  font-feature-settings: "ss01", "cv11";
}

.header-standalone {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(143,196,243,0.15);
  transition: background 0.2s ease;
}

section[id] { scroll-margin-top: 80px; }

/* ===== RESPONSIVE GRIDS ===== */
.hero-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 64px;
  align-items: center;
}
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin-top: 80px;
}
.services-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.tastiota-main-grid {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
}
.tastiota-data-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.diff-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.form-layout {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 80px;
}
.form-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* ===== HAMBURGER ===== */
.nav-desktop { display: flex; gap: 32px; align-items: center; }
.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
.hamburger span { display: block; width: 24px; height: 2px; background: #fff; transition: transform 0.2s, opacity 0.2s; }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.mobile-menu {
  display: none;
  flex-direction: column;
  padding: 16px 20px 24px;
  border-top: 1px solid rgba(143,196,243,0.15);
  gap: 4px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  letter-spacing: 0.06em;
  padding: 12px 0;
  border-bottom: 1px solid rgba(143,196,243,0.1);
  opacity: 0.85;
}
.mobile-menu a.cta {
  margin-top: 12px;
  padding: 14px 20px;
  background: var(--cielo);
  color: var(--marino-deep);
  font-weight: 700;
  text-align: center;
  border-bottom: none;
  opacity: 1;
}

/* ===== TABLET (≤1024px) ===== */
@media (max-width: 1024px) {
  .hero-grid { grid-template-columns: 1fr; gap: 48px; }
  .photo-stack { display: none; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .tastiota-main-grid { grid-template-columns: 1fr; }
  .tastiota-data-grid { border-top: 1px solid rgba(143,196,243,0.2); }
  .form-layout { grid-template-columns: 1fr; gap: 48px; }
  .diff-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ===== MOBILE (≤768px) ===== */
@media (max-width: 768px) {
  .container { padding: 0 20px !important; }

  .nav-desktop { display: none; }
  .hamburger { display: flex; }

  .hero-grid { gap: 32px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); margin-top: 48px; }

  .services-grid { grid-template-columns: 1fr; }

  .tastiota-section-header { flex-direction: column !important; align-items: flex-start !important; gap: 20px; }
  .tastiota-main-grid { grid-template-columns: 1fr; }
  .tastiota-left-panel { border-right: none !important; border-bottom: 1px solid rgba(143,196,243,0.2) !important; padding: 24px !important; }
  .tastiota-data-grid { grid-template-columns: 1fr 1fr; }

  .diff-grid { grid-template-columns: 1fr; }

  .form-layout { grid-template-columns: 1fr !important; gap: 40px; }
  .form-fields { grid-template-columns: 1fr !important; padding: 24px !important; }
  .form-fields .field { grid-column: auto !important; }
  .form-fields button[type="submit"] { grid-column: auto !important; }

  .footer-inner { flex-direction: column !important; align-items: flex-start !important; gap: 16px; }
  .footer-meta { flex-direction: column !important; gap: 8px !important; }

  .header-inner { padding: 14px 20px !important; }
  .division-badge { display: none; }
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</head>

<script type="text/babel">

/* ─────────────────────────────────────────
   HEADER
───────────────────────────────────────── */
const NAV_LINKS = [

  { label: 'Capacidades',   href: '#diferenciadores' },

const Header = () => {
  const [scrolled, setScrolled] = React.useState(false);
  const [menuOpen, setMenuOpen] = React.useState(false);

  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 40);

          onClick={() => setMenuOpen(o => !o)}
          aria-label="Menú"

          <span/><span/><span/>

      <div className={`mobile-menu ${menuOpen ? 'open' : ''}`}>
